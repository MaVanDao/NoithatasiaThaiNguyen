<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chỉnh sửa Dịch vụ — Admin Asia</title>

  <link rel="stylesheet" href="/FE/assets/css/variables.css">
  <link rel="stylesheet" href="/FE/assets/css/reset.css">
  <link rel="stylesheet" href="/FE/assets/css/typography.css">
  <link rel="stylesheet" href="/FE/assets/css/layout.css">
  <link rel="stylesheet" href="/FE/assets/css/admin.css">
  <link rel="stylesheet" href="/FE/assets/css/components.css">
  <link rel="stylesheet" href="/FE/assets/css/utilities.css">
</head>
<body>

  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="logo-text">Asia <span>Admin</span></div>
      <nav class="admin-nav">
        <a href="/FE/admin/dashboard.html" class="admin-nav-link">Dashboard</a>
        <a href="/FE/admin/products.html" class="admin-nav-link">Sản phẩm</a>
        <a href="/FE/admin/services.html" class="admin-nav-link is-active">Dịch vụ</a>
        <a href="/FE/admin/consultations.html" class="admin-nav-link">Tư vấn</a>
        <a href="/FE/admin/contacts.html" class="admin-nav-link">Liên hệ</a>
        <a href="/FE/admin/settings.html" class="admin-nav-link">Cài đặt</a>
      </nav>
    </aside>

    <main>
      <div class="admin-topbar">
        <div class="admin-topbar-title">Chỉnh sửa dịch vụ</div>
      </div>

      <section class="admin-content">
        <div class="admin-form-card">
          <div class="section-head section-head--compact">
            <div>
              <h2 class="section-title">Thông tin dịch vụ</h2>
              <p class="section-subtitle">Nhập tên, loại, giá và mô tả cho dịch vụ.</p>
            </div>
          </div>

          <form>
            <div class="field-grid">
              <div class="field">
                <label for="service-name">Tên dịch vụ</label>
                <input id="service-name" type="text" placeholder="Nhập tên dịch vụ">
              </div>
              <div class="field">
                <label for="service-category">Danh mục</label>
                <select id="service-category">
                  <option>Phòng ngủ</option>
                  <option>Phòng khách</option>
                </select>
              </div>
            </div>

            <div class="field-grid">
              <div class="field">
                <label for="service-price">Giá tham khảo</label>
                <input id="service-price" type="text" placeholder="5.000.000₫">
              </div>
              <div class="field">
                <label for="service-status">Trạng thái</label>
                <select id="service-status">
                  <option>Hiện</option>
                  <option>Ẩn</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label for="service-description">Mô tả</label>
              <textarea id="service-description" rows="4" placeholder="Mô tả ngắn về dịch vụ"></textarea>
            </div>

            <div class="form-submit-row">
              <button type="submit" class="btn btn-solid">Lưu dịch vụ</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>

</body>
</html>
