<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO — Admin Asia</title>

  <link rel="stylesheet" href="/FE/assets/css/variables.css">
  <link rel="stylesheet" href="/FE/assets/css/reset.css">
  <link rel="stylesheet" href="/FE/assets/css/typography.css">
  <link rel="stylesheet" href="/FE/assets/css/layout.css">
  <link rel="stylesheet" href="/FE/assets/css/admin.css">
  <link rel="stylesheet" href="/FE/assets/css/components.css">
  <link rel="stylesheet" href="/FE/assets/css/utilities.css">
</head>
<body>

  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="logo-text">Asia <span>Admin</span></div>
      <nav class="admin-nav">
        <a href="/FE/admin/dashboard.html" class="admin-nav-link">Dashboard</a>
        <a href="/FE/admin/products.html" class="admin-nav-link">Sản phẩm</a>
        <a href="/FE/admin/services.html" class="admin-nav-link">Dịch vụ</a>
        <a href="/FE/admin/consultations.html" class="admin-nav-link">Tư vấn</a>
        <a href="/FE/admin/contacts.html" class="admin-nav-link">Liên hệ</a>
        <a href="/FE/admin/settings.html" class="admin-nav-link">Cài đặt</a>
      </nav>
    </aside>

    <main>
      <div class="admin-topbar">
        <div class="admin-topbar-title">SEO</div>
      </div>

      <section class="admin-content">
        <div class="admin-form-card">
          <div class="section-head section-head--compact">
            <div>
              <h2 class="section-title">Cấu hình SEO</h2>
              <p class="section-subtitle">Thiết lập tiêu đề, mô tả và thẻ meta cho trang chủ.</p>
            </div>
          </div>

          <form>
            <div class="field-grid">
              <div class="field">
                <label for="seo-title">Tiêu đề trang</label>
                <input id="seo-title" type="text" placeholder="Nội Thất Asia Thái Nguyên — Nội Thất Hiện Đại">
              </div>
              <div class="field">
                <label for="seo-slug">Đường dẫn SEO</label>
                <input id="seo-slug" type="text" placeholder="noithat-asia-thai-nguyen">
              </div>
            </div>

            <div class="field">
              <label for="seo-description">Mô tả meta</label>
              <textarea id="seo-description" rows="4" placeholder="Mô tả tối ưu cho công cụ tìm kiếm..."></textarea>
            </div>

            <div class="form-submit-row">
              <button type="submit" class="btn btn-solid">Lưu SEO</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>

</body>
</html>
