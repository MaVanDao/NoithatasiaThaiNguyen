<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cài đặt Admin — Nội Thất Asia</title>

  <link rel="stylesheet" href="/FE/assets/css/variables.css">
  <link rel="stylesheet" href="/FE/assets/css/reset.css">
  <link rel="stylesheet" href="/FE/assets/css/typography.css">
  <link rel="stylesheet" href="/FE/assets/css/layout.css">
  <link rel="stylesheet" href="/FE/assets/css/admin.css">
  <link rel="stylesheet" href="/FE/assets/css/components.css">
  <link rel="stylesheet" href="/FE/assets/css/utilities.css">
</head>
<body>

  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="logo-text">Asia <span>Admin</span></div>
      <nav class="admin-nav">
        <a href="/FE/admin/dashboard.html" class="admin-nav-link">Dashboard</a>
        <a href="/FE/admin/products.html" class="admin-nav-link">Sản phẩm</a>
        <a href="/FE/admin/services.html" class="admin-nav-link">Dịch vụ</a>
        <a href="/FE/admin/consultations.html" class="admin-nav-link">Tư vấn</a>
        <a href="/FE/admin/contacts.html" class="admin-nav-link">Liên hệ</a>
        <a href="/FE/admin/settings.html" class="admin-nav-link is-active">Cài đặt</a>
      </nav>
    </aside>

    <main>
      <div class="admin-topbar">
        <div class="admin-topbar-title">Cài đặt</div>
      </div>

      <section class="admin-content">
        <div class="admin-form-card">
          <div class="section-head section-head--compact">
            <div>
              <h2 class="section-title">Cài đặt chung</h2>
              <p class="section-subtitle">Cập nhật thông tin hiển thị, liên hệ và cấu hình trang.</p>
            </div>
          </div>

          <form>
            <div class="field-grid">
              <div class="field">
                <label for="site-name">Tên trang</label>
                <input id="site-name" type="text" placeholder="Nội Thất Asia Thái Nguyên">
              </div>
              <div class="field">
                <label for="site-phone">Số điện thoại</label>
                <input id="site-phone" type="text" placeholder="0988 123 456">
              </div>
            </div>

            <div class="field-grid">
              <div class="field">
                <label for="site-email">Email</label>
                <input id="site-email" type="email" placeholder="info@asia.com">
              </div>
              <div class="field">
                <label for="site-address">Địa chỉ</label>
                <input id="site-address" type="text" placeholder="Thái Nguyên, Việt Nam">
              </div>
            </div>

            <div class="field">
              <label for="site-description">Mô tả ngắn</label>
              <textarea id="site-description" placeholder="Mô tả hiển thị trên trang..."></textarea>
            </div>

            <div class="form-submit-row">
              <button type="submit" class="btn btn-solid">Lưu thay đổi</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>

</body>
</html>
