<script>
  document.addEventListener('DOMContentLoaded', () => {
    const wishlist = Asia.WishlistStore.getAll();
    const itemsContainer = document.getElementById('wishlist-items');
    const emptyState = document.getElementById('wishlist-empty');
    if (!wishlist.length) {
      emptyState.classList.add('is-visible');
      itemsContainer.classList.add('hidden');
      return;
    }
    emptyState.classList.remove('is-visible');
    itemsContainer.classList.remove('hidden');
    wishlist.forEach(id => {
      const item = document.createElement('div');
      item.className = 'state-box';
      item.innerHTML = `<div><div class="state-title">Sản phẩm ID: ${id}</div><div class="text-muted mt-8">Thêm vào danh sách yêu thích</div></div><button class="btn btn-border" type="button" data-remove-id="${id}">Xóa</button>`;
      itemsContainer.appendChild(item);
    });
    itemsContainer.addEventListener('click', (event) => {
      const btn = event.target.closest('[data-remove-id]');
      if (!btn) return;
      const id = Number(btn.dataset.removeId);
      Asia.WishlistStore.toggle(id);
      btn.closest('.state-box').remove();
      if (!Asia.WishlistStore.getAll().length) {
        emptyState.style.display = 'block';
        itemsContainer.style.display = 'none';
      }
    });
  });
</script>
