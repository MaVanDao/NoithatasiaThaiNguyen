<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đổi mật khẩu — Nội Thất Asia Thái Nguyên</title>
<meta name="description" content="Trang đổi mật khẩu của khách hàng.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/FE/assets/css/utilities.css">

</head>
<body>
<header id="site-header"></header>
<div class="container account-page-main">
  <nav class="breadcrumb" aria-label="Đường dẫn">
    <a href="/FE/pages/index.html">Trang Chủ</a>
    <span class="sep">›</span>
    <span class="current">Đổi mật khẩu</span>
  </nav>
  <section class="account-page-heading">
    <h1 class="page-title">Đổi mật khẩu</h1>
    <p class="account-page-desc">Bảo vệ tài khoản của bạn bằng mật khẩu mới.</p>
  </section>
  <section class="account-layout">
    <aside class="account-tabs">
      <a href="/FE/pages/tai-khoan/profile.html" class="account-tab">Hồ sơ của tôi</a>
      <a href="/FE/pages/tai-khoan/change-password.html" class="account-tab is-active">Đổi mật khẩu</a>
      <a href="/FE/pages/tai-khoan/consultations.html" class="account-tab">Lịch sử yêu cầu</a>
      <a href="/FE/pages/tai-khoan/wishlist.html" class="account-tab">Yêu thích</a>
    </aside>
    <section class="account-content">
      <div class="section-head account-section-head">
        <h2 class="section-title">Cập nhật mật khẩu</h2>
        <p class="section-description">Thay đổi mật khẩu để bảo mật thông tin của bạn.</p>
      </div>
      <form class="contact-form" id="password-form">
        <div class="field">
          <label for="current-password">Mật khẩu hiện tại</label>
          <input id="current-password" type="password" placeholder="Nhập mật khẩu hiện tại">
        </div>
        <div class="field">
          <label for="new-password">Mật khẩu mới</label>
          <input id="new-password" type="password" placeholder="Nhập mật khẩu mới">
        </div>
        <div class="field">
          <label for="confirm-password">Xác nhận mật khẩu mới</label>
          <input id="confirm-password" type="password" placeholder="Nhập lại mật khẩu mới">
        </div>
        <div class="form-submit-row">
          <button type="submit" class="btn btn-solid">Cập nhật mật khẩu</button>
        </div>
      </form>
    </section>
  </section>
</div>
<footer id="site-footer"></footer>
<script src="/FE/assets/js/constants/app-config.js"></script>
<script src="/FE/assets/js/constants/roles.js"></script>

<script src="/FE/assets/js/api/client.js"></script>
<script src="/FE/assets/js/store/auth.store.js"></script>
<script src="/FE/assets/js/store/user.store.js"></script>
<script src="/FE/assets/js/store/app.store.js"></script>
<script src="/FE/assets/js/store/wishlist.store.js"></script>
<script src="/FE/assets/js/components/toast.js"></script>
<script src="/FE/assets/js/components/modal.js"></script>

<script src="/FE/assets/js/components/messenger-widget.js"></script>
<script src="/FE/assets/js/components/navbar.js"></script>
<script src="/FE/assets/js/components/mobile-menu.js"></script>
<script src="/FE/assets/js/components/footer.js"></script>
<script>
  document.getElementById('password-form').addEventListener('submit', function(event) {
    event.preventDefault();
    const newPassword = document.getElementById('new-password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    if (!newPassword || newPassword !== confirmPassword) {
      alert('Mật khẩu mới và xác nhận mật khẩu phải khớp.');
      return;
    }
    alert('Mật khẩu đã được cập nhật (demo).');
    document.getElementById('password-form').reset();
  });
</script>
</body>
</html>
