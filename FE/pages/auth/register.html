<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Đăng Ký — Nội Thất Asia Thái Nguyên</title>
	<link rel="stylesheet" href="/FE/assets/css/variables.css">
	<link rel="stylesheet" href="/FE/assets/css/reset.css">
	<link rel="stylesheet" href="/FE/assets/css/typography.css">
	<link rel="stylesheet" href="/FE/assets/css/layout.css">
	<link rel="stylesheet" href="/FE/assets/css/account.css">
	<link rel="stylesheet" href="/FE/assets/css/components.css">
	<link rel="stylesheet" href="/FE/assets/css/responsive.css">
</head>
<body class="auth-page">

	<div class="auth-card">
		<div class="logo"><img src="/FE/assets/images/logo/logo.png" alt="Logo" style="height:40px;"/></div>
		<h2 class="auth-title">Tạo tài khoản</h2>
		<p class="auth-subtitle">Đăng ký để quản lý đơn hàng và nhận ưu đãi</p>

		<form id="register-form">
			<div class="field">
				<label for="reg-name">Họ và tên</label>
				<input id="reg-name" name="name" type="text" placeholder="Họ và tên">
			</div>
			<div class="field">
				<label for="reg-phone">Số điện thoại</label>
				<input id="reg-phone" name="phone" type="text" placeholder="Số điện thoại">
			</div>
			<div class="field">
				<label for="reg-password">Mật khẩu</label>
				<input id="reg-password" name="password" type="password" placeholder="Mật khẩu">
			</div>

			<div class="form-submit-row">
				<button type="submit" class="btn btn-solid">Đăng ký</button>
			</div>
		</form>

		<div class="auth-footer-text">
			<p>Đã có tài khoản? <a href="/FE/pages/auth/login.html">Đăng nhập</a></p>
		</div>
	</div>

	<script src="/FE/assets/js/utils/helpers.js"></script>
	<script src="/FE/assets/js/store/auth.store.js"></script>
	<script>
		// basic form stub
		document.getElementById('register-form').addEventListener('submit', e => { e.preventDefault(); alert('Gửi yêu cầu đăng ký (demo)'); });
	</script>
</body>
</html>
