<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Quên mật khẩu — Nội Thất Asia Thái Nguyên</title>
	<link rel="stylesheet" href="/FE/assets/css/variables.css">
	<link rel="stylesheet" href="/FE/assets/css/reset.css">
	<link rel="stylesheet" href="/FE/assets/css/typography.css">
	<link rel="stylesheet" href="/FE/assets/css/layout.css">
	<link rel="stylesheet" href="/FE/assets/css/account.css">
	<link rel="stylesheet" href="/FE/assets/css/components.css">
	<link rel="stylesheet" href="/FE/assets/css/responsive.css">
</head>
<body class="auth-page">
	<div class="auth-card">
		<div class="logo"><img src="/FE/assets/images/logo/logo.png" alt="Logo" style="height:40px;"/></div>
		<h2 class="auth-title">Quên mật khẩu</h2>
		<p class="auth-subtitle">Nhập số điện thoại để nhận mã xác thực</p>
		<form id="forgot-form">
			<div class="field">
				<label for="fp-phone">Số điện thoại</label>
				<input id="fp-phone" name="phone" type="text" placeholder="Số điện thoại">
			</div>
			<div class="form-submit-row">
				<button type="submit" class="btn btn-solid">Gửi mã</button>
			</div>
		</form>
		<div class="auth-footer-text"><a href="/FE/pages/auth/login.html">Quay lại đăng nhập</a></div>
	</div>

	<script src="/FE/assets/js/store/auth.store.js"></script>
	<script>
		document.getElementById('forgot-form').addEventListener('submit', e => { e.preventDefault(); alert('Gửi OTP (demo)'); });
	</script>
</body>
</html>
