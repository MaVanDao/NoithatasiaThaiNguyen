<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Đặt lại mật khẩu — Nội Thất Asia Thái Nguyên</title>
	<link rel="stylesheet" href="/FE/assets/css/variables.css">
	<link rel="stylesheet" href="/FE/assets/css/reset.css">
	<link rel="stylesheet" href="/FE/assets/css/typography.css">
	<link rel="stylesheet" href="/FE/assets/css/layout.css">
	<link rel="stylesheet" href="/FE/assets/css/account.css">
	<link rel="stylesheet" href="/FE/assets/css/components.css">
	<link rel="stylesheet" href="/FE/assets/css/responsive.css">
</head>
<body class="auth-page">
	<div class="auth-card">
		<div class="logo"><img src="/FE/assets/images/logo/logo.png" alt="Logo" style="height:40px;"/></div>
		<h2 class="auth-title">Đặt lại mật khẩu</h2>
		<p class="auth-subtitle">Nhập mật khẩu mới cho tài khoản của bạn</p>
		<form id="reset-form">
			<div class="field">
				<label for="rp-password">Mật khẩu mới</label>
				<input id="rp-password" name="password" type="password" placeholder="Mật khẩu mới">
			</div>
			<div class="field">
				<label for="rp-password2">Xác nhận mật khẩu</label>
				<input id="rp-password2" name="password2" type="password" placeholder="Xác nhận mật khẩu">
			</div>
			<div class="form-submit-row"><button class="btn btn-solid">Cập nhật</button></div>
		</form>
		<div class="auth-footer-text"><a href="/FE/pages/auth/login.html">Quay lại đăng nhập</a></div>
	</div>

	<script src="/FE/assets/js/store/auth.store.js"></script>
</body>
</html>
