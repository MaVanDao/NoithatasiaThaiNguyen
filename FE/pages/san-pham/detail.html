<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi Tiết Sản Phẩm — Nội Thất Asia Thái Nguyên</title>
<meta name="description" content="Chi tiết sản phẩm nội thất Asia Thái Nguyên.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/FE/assets/css/variables.css">
<link rel="stylesheet" href="/FE/assets/css/reset.css">
<link rel="stylesheet" href="/FE/assets/css/typography.css">
<link rel="stylesheet" href="/FE/assets/css/layout.css">
<link rel="stylesheet" href="/FE/assets/css/components.css">
<link rel="stylesheet" href="/FE/assets/css/animations.css">
<link rel="stylesheet" href="/FE/assets/css/utilities.css">
<link rel="stylesheet" href="/FE/assets/css/responsive.css">
</head>
<body>

<header id="site-header"></header>

<div id="detail-main">
  <div class="container">

    <!-- ============ BREADCRUMB ============ -->
    <nav class="breadcrumb" aria-label="Đường dẫn">
      <a href="/FE/pages/index.html">Trang Chủ</a>
      <span class="sep">›</span>
      <span>Sản Phẩm</span>
      <span id="breadcrumb-extra"></span>
    </nav>

    <!-- ============ GALLERY + THÔNG TIN ============ -->
    <div class="detail-layout">

      <!-- Gallery ảnh + video -->
      <div>
        <div class="detail-gallery-main" id="gallery-main-image">Ảnh sản phẩm</div>
        <video class="detail-gallery-video" id="gallery-main-video" controls style="display:none;"></video>

        <div class="detail-gallery-thumbs" id="gallery-thumbs">
          <div class="detail-gallery-thumb is-active" data-media-type="image">Ảnh 1</div>
          <div class="detail-gallery-thumb" data-media-type="image">Ảnh 2</div>
          <div class="detail-gallery-thumb" data-media-type="image">Ảnh 3</div>
          <div class="detail-gallery-thumb" data-media-type="image">Ảnh 4</div>
          <!-- Ô video chỉ tự hiện ra nếu sản phẩm có video (xem product-detail.js) -->
        </div>
      </div>

      <!-- Thông tin sản phẩm -->
      <div>
        <h1 class="detail-info-name" id="detail-name"></h1>
        <div class="detail-info-price" id="detail-price"></div>

        <div class="detail-info-row">
          <span>Chất liệu:</span>
          <strong id="detail-material"></strong>
        </div>

        <p class="detail-info-description" id="detail-description"></p>

        <div class="detail-actions">
          <button type="button" class="btn btn-solid" id="detail-order-btn">Liên Hệ Đặt Hàng</button>
          <button type="button" class="detail-wishlist-toggle" id="detail-wishlist-btn" aria-label="Yêu thích">♥</button>
        </div>
      </div>

    </div>

    <!-- ============ SẢN PHẨM LIÊN QUAN ============ -->
    <div class="related-section">
      <h2 class="section-title" style="margin-bottom:28px;">Sản Phẩm Liên Quan</h2>
      <div class="product-grid" id="related-grid"></div>
    </div>

  </div>
</div>

<footer id="site-footer"></footer>

<!-- ============ SCRIPT — PHẢI đúng thứ tự này ============ -->
