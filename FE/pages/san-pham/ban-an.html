<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bàn Ăn — Nội Thất Asia Thái Nguyên</title>
<meta name="description" content="Bàn Ăn Asia Thái Nguyên - Bàn ăn gỗ tự nhiên, mặt đá, bàn ăn mở rộng nhiều kích cỡ. Giao hàng và lắp đặt tận nơi.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/FE/assets/css/variables.css">
<link rel="stylesheet" href="/FE/assets/css/reset.css">
<link rel="stylesheet" href="/FE/assets/css/typography.css">
<link rel="stylesheet" href="/FE/assets/css/layout.css">
<link rel="stylesheet" href="/FE/assets/css/components.css">
<link rel="stylesheet" href="/FE/assets/css/animations.css">
<link rel="stylesheet" href="/FE/assets/css/utilities.css">
<link rel="stylesheet" href="/FE/assets/css/responsive.css">
</head>
<body>

<header id="site-header"></header>

<div class="container">

  <!-- ============ BREADCRUMB ============ -->
  <nav class="breadcrumb" aria-label="Đường dẫn">
    <a href="/FE/pages/index.html">Trang Chủ</a>
    <span class="sep">›</span>
    <span>Sản Phẩm</span>
    <span class="sep">›</span>
    <span class="current" id="breadcrumb-current">Bàn Ăn</span>
  </nav>

  <!-- ============ TIÊU ĐỀ ============ -->
  <div class="catalog-head">
    <h1 class="page-title" id="page-title">Bàn Ăn</h1>
  </div>

  <!-- ============ THANH SẮP XẾP ============ -->
  <div class="catalog-toolbar">
    <select class="sort-select" id="sort-select">
      <option value="newest">Sắp xếp: Mới nhất</option>
      <option value="price_asc">Sắp xếp: Giá tăng dần</option>
      <option value="price_desc">Sắp xếp: Giá giảm dần</option>
    </select>
  </div>

  <!-- ============ SIDEBAR LỌC + LƯỚI SẢN PHẨM ============ -->
  <div class="catalog-layout has-sidebar" style="padding-bottom:80px;">

    <aside class="filter-sidebar">
      <div class="filter-block">
        <div class="filter-title">Khoảng Giá</div>
        <input type="range" class="filter-range" id="filter-price"
               min="500000" max="30000000" step="500000" value="30000000">
        <div class="filter-range-values">
          <span>0đ</span>
          <span id="filter-price-value">30.000.000đ</span>
        </div>
      </div>
    </aside>

    <div>
      <p id="result-count" style="color:var(--gray-600); font-size:13.5px; margin-bottom:16px;"></p>

      <div class="product-grid" id="product-grid" data-category="ban-an"></div>

      <div class="pagination" id="pagination"></div>
    </div>

  </div>
</div>

<footer id="site-footer"></footer>
