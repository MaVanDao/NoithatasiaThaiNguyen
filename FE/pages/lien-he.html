  <section style="padding:12px 0 40px;">
    <h1 class="page-title">Liên Hệ</h1>
  </section>

  <section class="contact-layout" style="display:grid; gap:24px; align-items:start;">
    <section class="contact-form" style="margin-top:0; min-width:0;">
      <div class="section-head" style="margin-bottom:18px;">
        <h2 class="section-title" style="margin:0;">Thông tin liên hệ</h2>
      </div>
      <div class="contact-info-list">
        <div class="contact-info-row">
          <span class="icon">📍</span>
          <span>Địa chỉ: 123 Nguyễn Tất Thành, TP. Thái Nguyên</span>
        </div>
        <div class="contact-info-row">
          <span class="icon">📞</span>
          <span><a href="tel:0987654321" class="tel">0987 654 321</a></span>
        </div>
        <div class="contact-info-row">
          <span class="icon">✉️</span>
          <span><a href="mailto:noithatasia@gmail.com">noithatasia@gmail.com</a></span>
        </div>
        <div class="contact-info-row">
          <span class="icon">🕘</span>
          <span>Giờ làm việc: 08:00 – 18:00 (Thứ 2 – Chủ nhật)</span>
        </div>
      </div>

      <div class="social-row">
        <a href="#" class="social-icon" aria-label="Facebook">f</a>
        <a href="#" class="social-icon" aria-label="Instagram">i</a>
        <a href="#" class="social-icon" aria-label="Zalo">z</a>
      </div>
    </section>

    <section class="contact-form" style="margin-top:0;">
      <div class="section-head" style="margin-bottom:18px;">
        <h2 class="section-title" style="margin:0;">Gửi yêu cầu tư vấn</h2>
      </div>
      <form>
        <div class="field-grid">
          <div class="field">
            <label for="contact-name">Họ và tên</label>
            <input id="contact-name" name="name" type="text" placeholder="Nhập họ và tên">
          </div>
          <div class="field">
            <label for="contact-phone">Số điện thoại</label>
            <input id="contact-phone" name="phone" type="text" placeholder="Nhập số điện thoại">
          </div>
        </div>
        <div class="field">
          <label for="contact-message">Nội dung</label>
          <textarea id="contact-message" name="message" placeholder="Bạn cần hỗ trợ gì?"></textarea>
        </div>
        <div class="form-submit-row">
          <button type="submit" class="btn btn-solid">Gửi yêu cầu</button>
        </div>
      </form>
    </section>
  </section>

  <section style="margin-top:24px; min-width:0;">
    <div class="map-embed" style="min-height:250px; width:100%;">

            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3357.3236875594653!2d105.80185927472942!3d21.587350068360003!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x313527ade024592b%3A0xce136a3ce2f3b1a0!2zTuG7mWkgVGjhuqV0IEFzaWEgVGjDoWkgTmd1ecOqbg!5e1!3m2!1svi!2s!4v1782100242000!5m2!1svi!2s"

            referrerpolicy="no-referrer-when-downgrade"
            title="Bản đồ vị trí Nội Thất Asia Thái Nguyên"
        ></iframe>
    </div>
