<!-- Modal dialog template -->
<div class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-box">
    <button class="modal-close" type="button" aria-label="Đóng">×</button>
    <h2 class="modal-box-title">Tiêu đề modal</h2>
    <p class="modal-box-subtitle">Mô tả ngắn nội dung và thông tin cần hiển thị.</p>

    <div class="field">
      <label for="modal-input">Thông tin</label>
      <input id="modal-input" type="text" placeholder="Nhập nội dung">
    </div>

    <div class="form-submit-row">
      <button class="btn btn-solid">Xác nhận</button>
    </div>
  </div>
</div>
