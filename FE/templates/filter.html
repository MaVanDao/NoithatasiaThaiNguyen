<!-- Filter panel template -->
<div class="filter-panel">
  <div class="filter-panel-title">Bộ lọc sản phẩm</div>
  <div class="filter-panel-item">
    <label for="filter-price-range">Giá tối đa</label>
    <input id="filter-price-range" type="range" class="filter-range" min="500000" max="30000000" step="500000" value="30000000">
    <div class="filter-range-values"><span>0đ</span><span>30.000.000đ</span></div>
  </div>
  <div class="filter-panel-item">
    <label><input type="checkbox" name="filter-feature" value="new"> Sản phẩm mới</label>
  </div>
  <div class="filter-panel-item">
    <label><input type="checkbox" name="filter-feature" value="sale"> Có khuyến mãi</label>
  </div>
</div>
